<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Required | Marina Beric</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A;
      --white: #E3D7CC;
      --mid:   #5A5A5A;
      --rule:  #222222;
      --accent:#8C261F;
    }
    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(3rem, 8vw, 6rem) clamp(1.5rem, 8vw, 6rem);
      max-width: 680px;
    }

    .back {
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 3rem;
      display: inline-flex; align-items: center; gap: 0.4rem;
      transition: color 0.2s;
    }
    .back:hover { color: var(--white); }

    .eyebrow {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 1.25rem;
    }
    .headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      font-variation-settings: 'opsz' 72;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .body {
      font-size: 1rem; font-weight: 500; line-height: 1.7;
      color: rgba(255,255,255,0.65);
      max-width: 48ch;
      margin-bottom: 2.5rem;
    }

    .form {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      width: 100%;
      max-width: 480px;
    }
    .pw-input {
      flex: 1; min-width: 180px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: 0.85rem 1.1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }
    .pw-input::placeholder { color: rgba(255,255,255,0.28); }
    .pw-input:focus { border-color: rgba(255,255,255,0.55); }

    .pw-btn {
      font-family: 'Inter', sans-serif;
      font-size: 1rem; font-weight: 600;
      padding: 0.85rem 1.75rem;
      background: var(--white); color: var(--black);
      border: none; cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .pw-btn:hover { opacity: 0.88; }
    .pw-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      margin-top: 0.85rem;
      font-size: 0.88rem; color: #F87171;
      display: none;
    }
    .error.visible { display: block; }

    .footer-note {
      margin-top: 3rem;
      font-size: 0.75rem; color: rgba(255,255,255,0.25); letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .form { flex-direction: column; }
      .pw-input { min-width: 0; width: 100%; }
      .pw-btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="page">
    <a href="/" class="back">← marinaberic.com</a>

    <p class="eyebrow">Selected Work</p>
    <h1 class="headline">This case study is password protected.</h1>
    <p class="body">
      My work includes confidential client details and unpublished research.
      You can find the password on my resume.
    </p>

    <div class="form">
      <input
        class="pw-input"
        id="pwInput"
        type="password"
        placeholder="Enter password"
        aria-label="Portfolio password"
        autocomplete="current-password"
      />
      <button class="pw-btn" id="pwBtn">View Work</button>
    </div>
    <p class="error" id="pwError" role="alert">
      Incorrect password. Check your copy of my resume.
    </p>

    <p class="footer-note">© 2026 Marina Beric · Denver, CO</p>
  </div>

  <script>
    const input   = document.getElementById('pwInput');
    const btn     = document.getElementById('pwBtn');
    const errorEl = document.getElementById('pwError');

    // Where to send the user after successful auth
    const params = new URLSearchParams(window.location.search);
    const next   = params.get('next') || '/';

    // If error=1 in URL (shouldn't happen with JSON flow, but just in case)
    if (params.get('error') === '1') {
      errorEl.classList.add('visible');
    }

    async function submit() {
      const password = input.value.trim();
      if (!password) return;

      btn.disabled = true;
      btn.textContent = 'Checking…';
      errorEl.classList.remove('visible');

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (res.ok) {
          // Cookie is set — navigate to the case study
          window.location.href = next;
        } else {
          errorEl.classList.add('visible');
          input.value = '';
          input.focus();
          btn.disabled = false;
          btn.textContent = 'View Work';
        }
      } catch {
        errorEl.textContent = 'Something went wrong. Please try again.';
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'View Work';
      }
    }

    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    input.addEventListener('input',   () => errorEl.classList.remove('visible'));

    // Auto-focus
    input.focus();
  </script>

</body>
</html>
